<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CALC</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0a;--surface:#111;--s2:#1a1a1a;--s3:#222;
    --border:#2a2a2a;--text:#f0f0f0;--muted:#666;
    --orange:#ff6b35;--blue:#4a9eff;--green:#3ddc84;
    --red:#ff4545;--purple:#c8aaff;--gold:#ffcc44;
  }
  html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;overflow:hidden;touch-action:manipulation}
  .app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto}

  /* DISPLAY */
  .display{background:#080808;padding:14px 20px 10px;flex-shrink:0}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .brand{font-size:10px;font-weight:700;letter-spacing:.3em;color:var(--muted)}
  .controls{display:flex;gap:6px;align-items:center}
  .pill{font-size:10px;font-weight:700;letter-spacing:.12em;padding:4px 9px;border-radius:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;border:1px solid}
  .pill-deg{border-color:rgba(255,107,53,.4);background:rgba(255,107,53,.1);color:var(--orange)}
  .pill-sci{border-color:rgba(74,158,255,.4);background:rgba(74,158,255,.1);color:var(--blue)}
  .pill-info{border-color:rgba(61,220,132,.4);background:rgba(61,220,132,.1);color:var(--green)}

  .expr{font-family:'SF Mono','Courier New',monospace;font-size:12px;color:var(--muted);text-align:right;min-height:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
  .main-num{font-family:'SF Mono','Courier New',monospace;font-size:50px;font-weight:300;color:var(--text);text-align:right;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:font-size .1s;padding:4px 0}
  .main-num.sm{font-size:34px}.main-num.xs{font-size:22px}

  .badges{display:flex;gap:5px;justify-content:flex-end;margin-top:5px;flex-wrap:wrap;min-height:22px}
  .badge{font-size:10px;font-weight:700;letter-spacing:.12em;padding:3px 9px;border-radius:20px;border:1px solid;animation:bpop .25s ease}
  @keyframes bpop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .bp{background:rgba(200,170,255,.15);color:var(--purple);border-color:rgba(200,170,255,.3)}
  .be{background:rgba(74,158,255,.12);color:var(--blue);border-color:rgba(74,158,255,.25)}
  .bo{background:rgba(255,107,53,.1);color:var(--orange);border-color:rgba(255,107,53,.2)}
  .bi{background:rgba(255,204,68,.12);color:var(--gold);border-color:rgba(255,204,68,.3)}
  .bn{background:rgba(255,69,69,.1);color:var(--red);border-color:rgba(255,69,69,.2)}
  .bz{background:rgba(100,100,100,.15);color:#888;border-color:#333}
  .bps{background:rgba(61,220,132,.12);color:var(--green);border-color:rgba(61,220,132,.25)}

  .meta-row{display:flex;justify-content:space-between;margin-top:4px;min-height:14px}
  .mem-tag{font-size:10px;font-weight:700;color:var(--green);opacity:0;transition:opacity .3s;letter-spacing:.1em}
  .mem-tag.on{opacity:1}
  .err-tag{font-size:10px;font-weight:700;color:var(--red);opacity:0;transition:opacity .3s}
  .err-tag.on{opacity:1}

  .divider{height:1px;background:var(--border);flex-shrink:0}

  /* SCI PANEL */
  .sci-panel{background:#0d0d0d;overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1);flex-shrink:0}
  .sci-panel.open{max-height:280px}
  .sci-scroll{overflow-x:auto;overflow-y:hidden;padding:10px 8px 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;white-space:nowrap}
  .sci-scroll::-webkit-scrollbar{display:none}
  .sci-section{display:inline-flex;flex-direction:column;gap:6px;margin-right:14px;vertical-align:top}
  .ssl{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#333;padding-left:2px}
  .sci-row{display:flex;gap:6px}
  .sb{min-width:56px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'SF Mono','Courier New',monospace;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:.08s;user-select:none;padding:0 8px}
  .sb:active{transform:scale(.88);background:var(--s3)}
  .sb.trig{color:var(--blue);border-color:rgba(74,158,255,.2);background:rgba(74,158,255,.06)}
  .sb.pow{color:var(--orange);border-color:rgba(255,107,53,.2);background:rgba(255,107,53,.06)}
  .sb.logf{color:var(--green);border-color:rgba(61,220,132,.2);background:rgba(61,220,132,.06)}
  .sb.const{color:var(--purple);border-color:rgba(200,170,255,.2);background:rgba(200,170,255,.06)}
  .sb.extra{color:var(--gold);border-color:rgba(255,204,68,.2);background:rgba(255,204,68,.06)}

  /* BUTTON GRID */
  .btn-area{flex:1;padding:8px 8px 6px;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(7,1fr);gap:6px;min-height:0}
  .b{border-radius:13px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:400;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .08s,filter .1s;position:relative;overflow:hidden}
  .b:active{transform:scale(.89);filter:brightness(1.35)}
  .b-num{background:var(--s2);color:var(--text)}
  .b-op{background:var(--s3);color:#bbb;font-size:22px}
  .b-eq{background:var(--orange);color:#fff;border-color:var(--orange);font-size:24px;box-shadow:0 4px 18px rgba(255,107,53,.35)}
  .b-clr{background:rgba(255,69,69,.12);color:var(--red);border-color:rgba(255,69,69,.25);font-size:16px}
  .b-spc{background:rgba(74,158,255,.08);color:var(--blue);border-color:rgba(74,158,255,.2);font-size:16px}
  .b-mem{background:rgba(61,220,132,.07);color:var(--green);border-color:rgba(61,220,132,.18);font-size:12px;font-weight:700;letter-spacing:.05em}
  .span2{grid-column:span 2}

  /* SHEET */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
  .ov.open{opacity:1;pointer-events:all}
  .sheet{background:#111;border-radius:24px 24px 0 0;border:1px solid var(--border);width:100%;max-height:82vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
  .ov.open .sheet{transform:translateY(0)}
  .sh-handle{width:40px;height:4px;background:#333;border-radius:2px;margin:10px auto 0;flex-shrink:0}
  .sh-top{display:flex;justify-content:space-between;padding:12px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
  .sh-title{font-size:15px;font-weight:600;color:var(--text)}
  .sh-close{font-size:13px;color:var(--muted);cursor:pointer}
  .tabs{display:flex;gap:8px;padding:10px 16px;flex-shrink:0}
  .tab{flex:1;padding:7px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;letter-spacing:.08em;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .tab.active{background:var(--s3);color:var(--text);border-color:#444}
  .tc{display:none}.tc.active{display:block}
  .sh-body{overflow-y:auto;padding:10px 14px 28px;flex:1}

  /* Info cards */
  .icard{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
  .icard-title{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
  .icard-body{font-size:13px;color:#ccc;line-height:1.65}
  .icard-body b{color:var(--text)}
  .highlight{font-family:'SF Mono','Courier New',monospace;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--gold);margin-top:8px;line-height:1.7;display:block}
  .fr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1a1a1a}
  .fr:last-child{border-bottom:none}
  .fl{font-size:12px;color:var(--muted)}
  .fv{font-family:'SF Mono','Courier New',monospace;font-size:12px;color:var(--text)}

  /* History */
  .hi{padding:10px 14px;border-radius:12px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
  .hi:active{background:var(--s2)}
  .hi-e{font-family:'SF Mono','Courier New',monospace;font-size:11px;color:var(--muted);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hi-r{font-family:'SF Mono','Courier New',monospace;font-size:18px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hempty{text-align:center;padding:40px 0;color:#333;font-size:13px}
</style>
</head>
<body>
<div class="app">

  <div class="display">
    <div class="top-bar">
      <span class="brand">CALC</span>
      <div class="controls">
        <button class="pill pill-deg" id="angleBtn" onclick="toggleAngle()">DEG</button>
        <button class="pill pill-sci" onclick="toggleSci()">SCI ▾</button>
        <button class="pill pill-info" onclick="openInfo()">INFO</button>
      </div>
    </div>
    <div class="expr" id="expr"></div>
    <div class="main-num" id="mainNum">0</div>
    <div class="badges" id="badges"></div>
    <div class="meta-row">
      <span class="mem-tag" id="memTag">MEM</span>
      <span class="err-tag" id="errTag"></span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="sci-panel" id="sciPanel">
    <div class="sci-scroll">

      <div class="sci-section">
        <div class="ssl">Trig</div>
        <div class="sci-row">
          <button class="sb trig" onclick="sciF('sin')">sin</button>
          <button class="sb trig" onclick="sciF('cos')">cos</button>
          <button class="sb trig" onclick="sciF('tan')">tan</button>
        </div>
        <div class="sci-row">
          <button class="sb trig" onclick="sciF('asin')">sin⁻¹</button>
          <button class="sb trig" onclick="sciF('acos')">cos⁻¹</button>
          <button class="sb trig" onclick="sciF('atan')">tan⁻¹</button>
        </div>
      </div>

      <div class="sci-section">
        <div class="ssl">Power</div>
        <div class="sci-row">
          <button class="sb pow" onclick="sciF('sq')">x²</button>
          <button class="sb pow" onclick="sciF('cube')">x³</button>
          <button class="sb pow" onclick="ap('^')">xʸ</button>
        </div>
        <div class="sci-row">
          <button class="sb pow" onclick="sciF('sqrt')">√x</button>
          <button class="sb pow" onclick="sciF('cbrt')">∛x</button>
          <button class="sb pow" onclick="sciF('recip')">1/x</button>
        </div>
      </div>

      <div class="sci-section">
        <div class="ssl">Log</div>
        <div class="sci-row">
          <button class="sb logf" onclick="sciF('log')">log</button>
          <button class="sb logf" onclick="sciF('ln')">ln</button>
          <button class="sb logf" onclick="sciF('log2')">log₂</button>
        </div>
        <div class="sci-row">
          <button class="sb logf" onclick="sciF('exp')">eˣ</button>
          <button class="sb logf" onclick="sciF('10x')">10ˣ</button>
          <button class="sb logf" onclick="sciF('abs')">|x|</button>
        </div>
      </div>

      <div class="sci-section">
        <div class="ssl">Constants</div>
        <div class="sci-row">
          <button class="sb const" onclick="ins('pi')">π</button>
          <button class="sb const" onclick="ins('e')">e</button>
          <button class="sb const" onclick="ins('phi')">φ</button>
        </div>
        <div class="sci-row">
          <button class="sb const" onclick="ins('c')">c</button>
          <button class="sb const" onclick="ins('g')">g</button>
          <button class="sb const" onclick="ins('h')">ℎ</button>
        </div>
      </div>

      <div class="sci-section">
        <div class="ssl">Extras</div>
        <div class="sci-row">
          <button class="sb extra" onclick="sciF('fact')">n!</button>
          <button class="sb extra" onclick="sciF('floor')">floor</button>
          <button class="sb extra" onclick="sciF('ceil')">ceil</button>
        </div>
        <div class="sci-row">
          <button class="sb extra" onclick="sciF('round')">round</button>
          <button class="sb extra" onclick="sciF('perc')">x%</button>
          <button class="sb extra" onclick="sciF('2x')">2ˣ</button>
        </div>
      </div>

    </div>
  </div>

  <div class="divider"></div>

  <div class="btn-area">
    <button class="b b-mem" onclick="memClear()">MC</button>
    <button class="b b-mem" onclick="memRecall()">MR</button>
    <button class="b b-mem" onclick="memAdd()">M+</button>
    <button class="b b-mem" onclick="memSub()">M−</button>

    <button class="b b-clr" onclick="allClear()">AC</button>
    <button class="b b-spc" onclick="toggleSign()">±</button>
    <button class="b b-spc" onclick="ap('(')">(</button>
    <button class="b b-op"  onclick="ap('÷')">÷</button>

    <button class="b b-num" onclick="ap('7')">7</button>
    <button class="b b-num" onclick="ap('8')">8</button>
    <button class="b b-num" onclick="ap('9')">9</button>
    <button class="b b-op"  onclick="ap('×')">×</button>

    <button class="b b-num" onclick="ap('4')">4</button>
    <button class="b b-num" onclick="ap('5')">5</button>
    <button class="b b-num" onclick="ap('6')">6</button>
    <button class="b b-op"  onclick="ap('−')">−</button>

    <button class="b b-num" onclick="ap('1')">1</button>
    <button class="b b-num" onclick="ap('2')">2</button>
    <button class="b b-num" onclick="ap('3')">3</button>
    <button class="b b-op"  onclick="ap('+')">+</button>

    <button class="b b-num span2" style="justify-content:flex-start;padding-left:26px" onclick="ap('0')">0</button>
    <button class="b b-num" style="font-size:26px" onclick="appendDot()">·</button>
    <button class="b b-spc" style="font-size:18px" onclick="backspace()">⌫</button>

    <button class="b b-spc" onclick="ap(')')">)</button>
    <button class="b b-spc" style="font-size:12px;letter-spacing:.03em" onclick="openInfo()">INFO</button>
    <button class="b b-eq span2" onclick="calculate()">=</button>
  </div>
</div>

<!-- INFO SHEET -->
<div class="ov" id="ov" onclick="closeBg(event)">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-top">
      <span class="sh-title">Calculator Info</span>
      <span class="sh-close" onclick="closeSheet()">✕ Close</span>
    </div>
    <div class="tabs">
      <div class="tab active" id="t1" onclick="switchTab(1)">MATH INFO</div>
      <div class="tab" id="t2" onclick="switchTab(2)">HISTORY</div>
    </div>
    <div class="sh-body">
      <div class="tc active" id="c1"></div>
      <div class="tc" id="c2"></div>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────
let disp='0',expr='',memory=0,hasMemory=false;
let isResult=false,angleMode='DEG',sciOpen=false;
let history=[],lastResult=null;

const mainNum=document.getElementById('mainNum');
const exprEl=document.getElementById('expr');
const memTag=document.getElementById('memTag');
const errTag=document.getElementById('errTag');
const angleBtn=document.getElementById('angleBtn');
const sciPanel=document.getElementById('sciPanel');
const badgesEl=document.getElementById('badges');

// ── CONSTANTS ──────────────────────────────────
const CONSTS={
  pi:{v:Math.PI,           label:'π = 3.14159...'},
  e: {v:Math.E,            label:'e = 2.71828...'},
  phi:{v:1.6180339887498948,label:'φ = 1.61803...'},
  c: {v:299792458,         label:'c = 299,792,458 m/s (Speed of Light)'},
  g: {v:9.80665,           label:'g = 9.80665 m/s² (Gravity)'},
  h: {v:6.62607015e-34,    label:'h = 6.626×10⁻³⁴ J·s (Planck)'},
};

// ── DISPLAY ────────────────────────────────────
function update(n){
  mainNum.textContent=disp;
  exprEl.textContent=expr;
  mainNum.classList.remove('sm','xs');
  if(disp.length>14)mainNum.classList.add('xs');
  else if(disp.length>9)mainNum.classList.add('sm');
  renderBadges(n!==undefined?n:null);
}

function showErr(msg){
  errTag.textContent=msg;
  errTag.classList.add('on');
  setTimeout(()=>errTag.classList.remove('on'),2800);
}

// ── BADGES ─────────────────────────────────────
function isPrime(n){
  if(!Number.isInteger(n)||n<2)return false;
  if(n===2)return true;
  if(n%2===0)return false;
  for(let i=3;i<=Math.sqrt(n);i+=2)if(n%i===0)return false;
  return true;
}
function isPerfSq(n){
  if(n<0||!isFinite(n))return false;
  const s=Math.sqrt(n);
  return Number.isInteger(s)&&s*s===n;
}

function renderBadges(n){
  badgesEl.innerHTML='';
  if(n===null||n===undefined)return;
  const add=(cls,txt)=>{
    const el=document.createElement('span');
    el.className='badge '+cls;
    el.textContent=txt;
    badgesEl.appendChild(el);
  };
  if(!isFinite(n)){
    add('bi', n>0?'∞ INFINITY':'-∞ NEG INFINITY');
    return;
  }
  if(n===0){add('bz','ZERO');return;}
  if(n<0)add('bn','NEGATIVE');
  if(Number.isInteger(n)){
    const a=Math.abs(n);
    if(isPrime(a))add('bp','PRIME');
    if(n%2===0)add('be','EVEN'); else add('bo','ODD');
    if(isPerfSq(a))add('bps','PERFECT SQ');
  }
}

// ── INPUT ──────────────────────────────────────
function ap(ch){
  errTag.classList.remove('on');
  const ops=new Set(['+','−','×','÷','^','%']);
  if(isResult){
    if(ops.has(ch)){disp=disp+ch;isResult=false;}
    else{disp=ch;expr='';isResult=false;badgesEl.innerHTML='';}
  } else if(disp==='0'&&!ops.has(ch)&&ch!=='.'&&ch!=='('){
    disp=ch;
  } else {
    disp+=ch;
  }
  update();
}

function appendDot(){
  const parts=disp.split(/[\+\-\×\÷\^\(\)%]/);
  if(parts[parts.length-1].includes('.'))return;
  if(isResult){disp='0.';isResult=false;}
  else if(disp==='0')disp='0.';
  else disp+='.';
  update();
}

function allClear(){
  disp='0';expr='';isResult=false;lastResult=null;
  errTag.classList.remove('on');badgesEl.innerHTML='';update();
}

function backspace(){
  if(isResult){allClear();return;}
  disp=disp.slice(0,-1)||'0';update();
}

function toggleSign(){
  if(disp==='0')return;
  disp=disp.startsWith('-')?disp.slice(1):'-'+disp;update();
}

function toggleAngle(){
  angleMode=angleMode==='DEG'?'RAD':'DEG';
  angleBtn.textContent=angleMode;
  if(angleMode==='RAD'){
    angleBtn.style.cssText='color:#4a9eff;border-color:rgba(74,158,255,.4);background:rgba(74,158,255,.1)';
  } else {
    angleBtn.style.cssText='color:#ff6b35;border-color:rgba(255,107,53,.4);background:rgba(255,107,53,.1)';
  }
}

function toggleSci(){
  sciOpen=!sciOpen;
  sciPanel.classList.toggle('open',sciOpen);
}

function toRad(n){return angleMode==='DEG'?n*Math.PI/180:n;}
function fromRad(n){return angleMode==='DEG'?n*180/Math.PI:n;}

// ── SAFE EVAL (Infinity-aware) ─────────────────
function safeEval(raw){
  let s=raw
    .replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-')
    .replace(/\^/g,'**')
    .replace(/π/g,String(Math.PI))
    .replace(/φ/g,'1.6180339887498948482')
    .replace(/(?<![0-9eE])e(?![0-9+\-])/g,String(Math.E));
  const o=(s.match(/\(/g)||[]).length,cl=(s.match(/\)/g)||[]).length;
  s+=')'.repeat(Math.max(0,o-cl));
  return Function('"use strict";return('+s+')')();
}

// ── CALCULATE ──────────────────────────────────
function calculate(){
  errTag.classList.remove('on');
  if(!disp||disp==='0')return;
  const raw=disp;
  try{
    let result=safeEval(raw);

    // Division by zero → Infinity (not error)
    if(result===Infinity||result===-Infinity){
      const s=result===Infinity?'∞':'-∞';
      addH(raw,s);
      expr=raw+' =';disp=s;isResult=true;lastResult=result;
      update(result);renderH();
      return;
    }

    if(isNaN(result))throw new Error();
    result=roundR(result);
    const rs=fmt(result);
    addH(raw,rs);
    expr = raw + ' =';
    disp = rs;
    isResult = true;
    lastResult = result;
    update(result);
    renderH();
  }
